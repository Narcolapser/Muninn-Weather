name: Release APK

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag=""
          if git rev-parse --verify --quiet refs/tags/* >/dev/null; then
            latest_tag=$(git describe --tags --abbrev=0)
          fi

          base_version="0.0.0"
          if [[ -n "$latest_tag" ]]; then
            base_version=${latest_tag#v}
          fi

          commit_range="HEAD"
          if [[ -n "$latest_tag" ]]; then
            commit_range="${latest_tag}..HEAD"
          fi

          commits=$(git log --pretty=format:%s%n%b $commit_range)

          bump="patch"
          if echo "$commits" | grep -q "BREAKING CHANGE"; then
            bump="major"
          elif echo "$commits" | grep -Eq "^[a-zA-Z]+(\([^)]*\))?!:"; then
            bump="major"
          elif echo "$commits" | grep -Eq "^feat(\([^)]*\))?:"; then
            bump="minor"
          elif echo "$commits" | grep -Eq "^fix(\([^)]*\))?:"; then
            bump="patch"
          fi

          IFS='.' read -r major minor patch <<< "$base_version"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Build APK in Docker
        run: |
          set -euo pipefail
          docker compose run --rm android-build

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          apk_path=$(find app/build/outputs/apk -type f -name "*.apk" | head -n 1 || true)
          if [[ -z "$apk_path" ]]; then
            echo "APK not found in app/build/outputs/apk" >&2
            exit 1
          fi
          echo "apk_path=${apk_path}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.version.outputs.next_tag }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: ${{ steps.apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
